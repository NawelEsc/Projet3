<template>
    <lightning-card title="Opportunités du Compte" icon-name="standard:opportunity">
        <div class="slds-p-around_medium">
            <!-- Bouton -->
            <lightning-button 
                label="Rafraîchir" 
                onclick={handleRafraichir} 
                variant="brand"
                class="slds-m-bottom_small">
            </lightning-button>
            
            <!-- Spinner chargement -->
            <template if:false={opportunities}>
                <div class="slds-spinner slds-spinner_medium slds-m-top_medium"></div>
            </template>
            
            <!-- TABLEAU UNIQUEMENT si opportunités -->
            <template if:true={opportunities.length}>
                <lightning-datatable 
                    data={opportunities}
                    columns={columns}
                    key-field="Id"
                    onrowaction={handleRowAction}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>
            
            <!-- Erreur - TOUJOURS visible si error -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_error slds-p-around_medium slds-m-top_small">
                    Erreur chargement !
                </div>
            </template>
        </div>
    </lightning-card>
</template>
